name: CI

on:
  # Run on pushes to the main branch
  push:
    branches: [ "main" ]
  # Run on pull requests targeting the main branch
  pull_request:
    branches: [ "main" ]
  # Run every night at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow developers to manually trigger the workflow from the GitHub Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Install uv
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    # 2. Set up Python using the .python-version file
    # This looks for the file in the root of your repo by default
    - name: Set up Python
      run: uv python install

      # 3. Install dependencies
    - name: Install the project
      run: uv sync --frozen

    - name: Run tests
      run: uv run pytest
